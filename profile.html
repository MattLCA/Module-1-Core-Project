<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

    <!-- ICON IMPORTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>ModernTech - My Profile</title>
</head>


<body>
    <aside class="sidebar">
        <div>

            <!-- Logo -->
            <div class="logo">
                <img src="images/logo.svg" alt="logo">
                <div>
                    <h2>ModernTech</h2>
                </div>
            </div>

            <!-- Main Navigation -->
            <h5 class="sidebar-title">MAIN</h5>
            <nav>
                <a href="dashboard.html" id="nav-dashboard" class="nav-item">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>

                <a href="notifications.html" id="nav-notifications" class="nav-item">
                    <i class="fa-solid fa-bell"></i>
                    Inbox
                </a>

                <a href="attendance.html" id="nav-attendance" class="nav-item">
                    <i class="fa-solid fa-calendar-check"></i>
                    Attendance
                </a>

                <a href="leave.html" id="nav-leave" class="nav-item">
                    <i class="fa-solid fa-calendar-days"></i>
                    Leave
                </a>

                <a href="payroll.html" id="nav-payroll" class="nav-item">
                    <i class="fa-solid fa-coins" style="color: #ffffff;"></i>
                    Payroll
                </a>

                <a href="employee-information.html" id="nav-information" class="nav-item">
                    <i class="fa-solid fa-circle-info" style="color: #ffffff;"></i>
                    My Information
                </a>
            </nav>


            <h5 class="sidebar-title">ACCOUNT</h5>
            <nav>
                <a href="profile.html" id="nav-profile" class="nav-item">
                    <i class="fa-solid fa-circle-user" style="color: #ffffff;"></i>
                    My Profile
                </a>

                <a href="settings.html" id="nav-settings" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                    Settings
                </a>
            </nav>
        </div>


        <div>
            <div class="profile-card">
                <i class="fa-solid fa-user"></i>
                <div>
                    <h4>Sibongile Nkosi</h4>
                    <p>Staff ID: 125</p>
                </div>
            </div>

            <div class="logout-card">
                <i class="fa-solid fa-arrow-right-from-bracket" style="color: #ffffff;"></i>
                <h4>Log Out</h4>
            </div>
        </div>
    </aside>


    <!-- Main Content -->
    <main class="main-content">

        <section class="page">

            <!-- PAGE HEADER -->

            <header class="page-header">

                <div class="header-text">

                    <h1>My Profile</h1>

                    <p>Manage your personal information and account settings.</p>

                </div>

            </header>


            <div class="leave-tabs">

                <button class="leave-tab active" data-tab="request">

                    <i class="fa-solid fa-shield-halved"></i>

                    Contact Details

                </button>

                <button class="leave-tab" data-tab="balance">

                    <i class="fa-solid fa-sliders"></i>

                    Bank Details

                </button>

                <button class="leave-tab" data-tab="history">

                    <i class="fa-solid fa-bell"></i>

                    Document Uploads

                </button>

            </div>

        </section>


    </main>

    <!-- JavaScript -->
    <script src="javascript/sidebar.js"></script>
    <script src="javascript/script.js"></script>
    <script src="javascript/profile.js"></script>

</body>

</html>
