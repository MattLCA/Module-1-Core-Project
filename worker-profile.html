        aria-controls="sidebar">
        <i class="ti ti-menu-2" aria-hidden="true"></i>
    </button>

    <aside class="sidebar" id="sidebar">

    <main class="main-content">

        <section class="page">

            <header class="page-header">

                <div class="header-text">

                    <h1>My Information</h1>

                    <p>View your personal and employment information.</p>

                </div>

            </header>

            <div class="leave-tabs">

                <button class="emp-info-tab active" data-tab="personal">
                    <i class="fa-solid fa-id-card"></i>
                    Personal Information
                </button>

                <button class="emp-info-tab" data-tab="salary">
                    <i class="fa-solid fa-wallet"></i>

                </button>

                <button class="emp-info-tab" data-tab="history">
                    <i class="fa-solid fa-clock-rotate-left"></i>

            </div>

            <section class="emp-info-card">

                <div id="personal" class="emp-info-content active">

                    <div class="emp-info-title">

                        <div>

                            <h2>
                                <i class="fa-solid fa-user"></i>

                            <p>Your personal and employment details.</p>

                        </div>

                    </div>

                    <!-- rest of your Personal Information content -->

                </div>

                <div id="salary" class="emp-info-content">

                    <div class="emp-info-title">

                        <div>

                            <h2>
                                <i class="fa-solid fa-money-check-dollar"></i>
                                Salary Details
                            </h2>

                            <p>Your salary information.</p>

                        </div>

                    </div>

                    <!-- rest of your Salary Details content -->

                </div>

                <div id="history" class="emp-info-content">

                    <div class="emp-info-title">

                        <div>

                            <h2>
                                <i class="fa-solid fa-briefcase"></i>
                                Work History
                            </h2>

                    </div>

                    <!-- rest of your Work History content -->

                </div>
